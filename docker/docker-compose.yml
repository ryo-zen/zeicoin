# docker-compose.yml — 3-node zen_server topology with libp2p
# Uses static IPs so ZEICOIN_BOOTSTRAP can be multiaddr (/ip4/.../tcp/...)

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  networks:
    - zeicoin-network
  healthcheck:
    test: ["CMD-SHELL", "nc -z $$ZEICOIN_BIND_IP 10801"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

x-common-env: &common-env
  ZEICOIN_NETWORK: testnet
  ZEICOIN_TEST_MODE: "true"
  ZEICOIN_P2P_PORT: 10801
  ZEICOIN_API_PORT: 10802
  ZEICOIN_KAD_REFRESH_INTERVAL_MS: "5000"
  ZEICOIN_REACHABILITY: "public"

services:
  miner-1:
    <<: *common
    container_name: zeicoin-miner-1
    ports:
      - "10801:10801"
      - "10802:10802"
      - "10803:10803"
    volumes:
      - miner1-data:/zeicoin/zeicoin_data_testnet
    environment:
      <<: *common-env
      ZEICOIN_BIND_IP: 172.33.0.10
      ZEICOIN_SERVER: 172.33.0.10
      ZEICOIN_BOOTSTRAP: ""
      ZEICOIN_MINE_ENABLED: "true"
      ZEICOIN_MINER_WALLET: miner1
      ZEICOIN_WALLET_PASSWORD: miner123
    networks:
      zeicoin-network:
        ipv4_address: 172.33.0.10
    command: ["/scripts/init-seed.sh"]

  miner-2:
    <<: *common
    container_name: zeicoin-miner-2
    ports:
      - "10811:10801"
      - "10812:10802"
      - "10813:10803"
    volumes:
      - miner2-data:/zeicoin/zeicoin_data_testnet
    environment:
      <<: *common-env
      ZEICOIN_BIND_IP: 172.33.0.11
      ZEICOIN_SERVER: 172.33.0.11
      ZEICOIN_BOOTSTRAP: "/ip4/172.33.0.10/tcp/10801"
      ZEICOIN_MINE_ENABLED: "true"
      ZEICOIN_MINER_WALLET: miner2
      ZEICOIN_WALLET_PASSWORD: miner123
    depends_on:
      miner-1:
        condition: service_healthy
    networks:
      zeicoin-network:
        ipv4_address: 172.33.0.11
    command: ["/scripts/init-node.sh"]

  node-1:
    <<: *common
    container_name: zeicoin-node-1
    ports:
      - "10821:10801"
      - "10822:10802"
      - "10823:10803"
    volumes:
      - node1-data:/zeicoin/zeicoin_data_testnet
    environment:
      <<: *common-env
      ZEICOIN_BIND_IP: 172.33.0.12
      ZEICOIN_SERVER: 172.33.0.12
      ZEICOIN_BOOTSTRAP: "/ip4/172.33.0.10/tcp/10801"
      ZEICOIN_MINE_ENABLED: "false"
    depends_on:
      miner-1:
        condition: service_healthy
      miner-2:
        condition: service_healthy
    networks:
      zeicoin-network:
        ipv4_address: 172.33.0.12
    command: ["/scripts/init-node.sh"]

networks:
  zeicoin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.33.0.0/24

volumes:
  miner1-data:
  miner2-data:
  node1-data:
